<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Дэшборд</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="wrapper">

    <aside class="sidebar">

        <h4 class="text-center mb-4">
            Admin
        </h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a href="dashboard.html" class="nav-link active">
                    Дэшборд
                </a>
            </li>

            <li class="nav-item">
                <a href="orders.html" class="nav-link">
                    Заказы
                </a>
            </li>

            <li class="nav-item">
                <a href="products.html" class="nav-link">

                </a>
            </li>

            <li class="nav-item">
                <a href="locations.html" class="nav-link">
                    Места
                </a>
            </li>

            <li class="nav-item mt-3">
                <button
                    id="themeToggle"
                    class="btn btn-outline-light w-100">
                    🌙 Тема
                </button>
            </li>

            <li class="nav-item mt-3">
                <a
                    href="login.html"
                    class="btn btn-danger w-100">
                    Выйти
                </a>
            </li>

        </ul>

    </aside>

    <main class="content">

        <div class="container-fluid">

            <h2 class="mb-4">
                Дэшборд
            </h2>

            <div class="row g-4 mb-4">

                <div class="col-lg-3 col-md-6">

                    <div class="card stat-card">

                        <div class="card-body">

                            <h5>Заказы</h5>

                            <h2>124</h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="card stat-card">

                        <div class="card-body">

                            <h5>Пользователи</h5>

                            <h2>342</h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="card stat-card">

                        <div class="card-body">

                            <h5>Товары</h5>

                            <h2>57</h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="card stat-card">

                        <div class="card-body">

                            <h5>Локации</h5>

                            <h2>12</h2>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card p-4 mb-4">

                <h4 class="mb-3">
                    Активность
                </h4>

                <canvas id="salesChart"></canvas>

            </div>

            <div class="card p-4">

                <h4 class="mb-3">
                    Последние пользователи
                </h4>

                <div class="table-responsive">

                    <table class="table table-hover">

                        <thead>

                            <tr>

                                <th>ID</th>
                                <th>Имя</th>
                                <th>Email</th>
                                <th>Статус</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>
                                <td>1</td>
                                <td>Иван Иванов</td>
                                <td>ivan@mail.ru</td>
                                <td>Активен</td>
                            </tr>

                            <tr>
                                <td>2</td>
                                <td>Анна Смирнова</td>
                                <td>anna@mail.ru</td>
                                <td>Активен</td>
                            </tr>

                            <tr>
                                <td>3</td>
                                <td>Петр Соколов</td>
                                <td>petr@mail.ru</td>
                                <td>Ожидает</td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

new Chart(
document.getElementById('salesChart'),
{
    type:'line',

    data:{
        labels:[
            'Янв',
            'Фев',
            'Мар',
            'Апр',
            'Май',
            'Июн'
        ],

        datasets:[{

            label:'Активность',

            data:[
                12,
                19,
                15,
                27,
                30,
                45
            ]

        }]
    }
});

</script>

<script src="theme.js"></script>

</body>
</html>
