<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Редактирование места</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="wrapper">

    <aside class="sidebar">

        <h4 class="text-center mb-4">
            Admin
        </h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    Дэшборд
                </a>
            </li>

            <li class="nav-item">
                <a href="orders.html" class="nav-link">
                    Заказы
                </a>
            </li>

            <li class="nav-item">
                <a href="products.html" class="nav-link">
                    Товары
                </a>
            </li>

            <li class="nav-item">
                <a href="locations.html" class="nav-link active">
                    Места
                </a>
            </li>

            <li class="nav-item mt-3">
                <button
                    id="themeToggle"
                    class="btn btn-outline-light w-100">
                    🌙 Тема
                </button>
            </li>

            <li class="nav-item mt-3">
                <a
                    href="login.html"
                    class="btn btn-danger w-100">
                    Выйти
                </a>
            </li>

        </ul>

    </aside>

    <main class="content">

        <div class="container-fluid">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2>
                    Редактирование места
                </h2>

                <span class="badge bg-warning text-dark fs-6">
                    Локация
                </span>

            </div>

            <div class="card p-4">

                <div class="row">

                    <div class="col-lg-4 text-center">

                        <img
                            src="https://placehold.co/600x400"
                            class="img-fluid rounded mb-3"
                            alt="location">

                        <input
                            type="file"
                            class="form-control">

                    </div>

                    <div class="col-lg-8">

                        <div class="mb-3">

                            <label class="form-label">
                                Название места
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="Главный магазин">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Адрес
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="г. Москва, ул. Центральная, 1">

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Широта
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    value="55.7558">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Долгота
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    value="37.6173">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Описание
                            </label>

                            <textarea
                                class="form-control"
                                rows="5">Основная точка продаж фирменного мерча, выдачи интернет-заказов и обслуживания клиентов.</textarea>

                        </div>

                        <div class="d-flex gap-2">

                            <button
                                class="btn btn-success"
                                onclick="saveLocation()">

                                Сохранить

                            </button>

                            <a
                                href="locations.html"
                                class="btn btn-secondary">

                                Назад

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="theme.js"></script>

<script>

function saveLocation(){

    alert(
        'Изменения сохранены'
    );

}

</script>

</body>
</html>
