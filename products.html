<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Товары</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="wrapper">

    <aside class="sidebar">

        <h4 class="text-center mb-4">
            Admin
        </h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    Дэшборд
                </a>
            </li>

            <li class="nav-item">
                <a href="orders.html" class="nav-link">
                    Заказы
                </a>
            </li>

            <li class="nav-item">
                <a href="products.html" class="nav-link active">
                    Товары
                </a>
            </li>

            <li class="nav-item">
                <a href="locations.html" class="nav-link">
                    Места
                </a>
            </li>

            <li class="nav-item mt-3">
                <button
                    id="themeToggle"
                    class="btn btn-outline-light w-100">
                    🌙 Тема
                </button>
            </li>

            <li class="nav-item mt-3">
                <a
                    href="login.html"
                    class="btn btn-danger w-100">
                    Выйти
                </a>
            </li>

        </ul>

    </aside>

    <main class="content">

        <div class="container-fluid">

            <h2 class="mb-4">
                Товары
            </h2>

            <div class="card p-4 mb-4">

                <h4 class="mb-3">
                    Добавить товар
                </h4>

                <div class="row g-3">

                    <div class="col-md-6">
                        <input
                            id="name"
                            type="text"
                            class="form-control"
                            placeholder="Название товара">
                    </div>

                    <div class="col-md-6">
                        <input
                            id="article"
                            type="text"
                            class="form-control"
                            placeholder="Артикул">
                    </div>

                    <div class="col-md-6">
                        <input
                            id="weight"
                            type="text"
                            class="form-control"
                            placeholder="Вес">
                    </div>

                    <div class="col-md-6">
                        <input
                            id="price"
                            type="number"
                            class="form-control"
                            placeholder="Цена">
                    </div>

                    <div class="col-12">

                        <textarea
                            id="description"
                            class="form-control"
                            rows="3"
                            placeholder="Описание товара"></textarea>

                    </div>

                    <div class="col-12">

                        <input
                            id="image"
                            type="file"
                            class="form-control"
                            accept="image/*">

                    </div>

                    <div class="col-12">

                        <button
                            id="addProductBtn"
                            class="btn btn-success">

                            Добавить товар

                        </button>

                    </div>

                </div>

            </div>

            <div
                class="row g-4"
                id="productsContainer">

            </div>

        </div>

    </main>

</div>

<script src="theme.js"></script>

<script>

const defaultProducts = [

    {
        name: "Футболка Logo",
        article: "TSH-001",
        weight: "300 г",
        price: "2000",
        description: "Фирменная футболка магазина",
        image: "https://placehold.co/600x400"
    },

    {
        name: "Кружка Brand",
        article: "MUG-001",
        weight: "500 г",
        price: "500",
        description: "Фирменная кружка магазина",
        image: "https://placehold.co/600x400"
    }

];

const container =
document.getElementById('productsContainer');

function renderProducts(){

    const saved =
    JSON.parse(localStorage.getItem('products')) || [];

    const products =
    [...defaultProducts, ...saved];

    container.innerHTML = '';

    products.forEach((product,index)=>{

        container.innerHTML += `

        <div class="col-lg-4 col-md-6">

            <div class="card h-100">

                <img
                    src="${product.image}"
                    class="card-img-top"
                    alt="product">

                <div class="card-body">

                    <h5>
                        ${product.name}
                    </h5>

                    <p>
                        Артикул: ${product.article}
                    </p>

                    <p>
                        Вес: ${product.weight}
                    </p>

                    <p>
                        Цена: ${product.price} ₽
                    </p>

                    <p>
                        ${product.description}
                    </p>

${
    index >= 2
    ?
    `
    <div class="d-flex gap-2">

        <a
            href="product-details.html"
            class="btn btn-primary">

            Подробнее

        </a>

        <button
            class="btn btn-danger"
            onclick="deleteProduct(${index-2})">

            Удалить

        </button>

    </div>
    `
    :
    `
    <a
        href="product-details.html"
        class="btn btn-primary">

        Подробнее

    </a>
    `
}

                </div>

            </div>

        </div>

        `;

    });

}

function deleteProduct(index){

    const products =
    JSON.parse(localStorage.getItem('products')) || [];

    products.splice(index,1);

    localStorage.setItem(
        'products',
        JSON.stringify(products)
    );

    renderProducts();

}

document
.getElementById('addProductBtn')
.addEventListener('click',()=>{

    const file =
    document.getElementById('image').files[0];

    if(!file){

        alert('Выберите изображение');

        return;
    }

    const reader =
    new FileReader();

    reader.onload = function(){

        const product = {

            name:
            document.getElementById('name').value,

            article:
            document.getElementById('article').value,

            weight:
            document.getElementById('weight').value,

            price:
            document.getElementById('price').value,

            description:
            document.getElementById('description').value,

            image:
            reader.result

        };

        const products =
        JSON.parse(
            localStorage.getItem('products')
        ) || [];

        products.push(product);

        localStorage.setItem(
            'products',
            JSON.stringify(products)
        );

        renderProducts();

        document.getElementById('name').value = '';
        document.getElementById('article').value = '';
        document.getElementById('weight').value = '';
        document.getElementById('price').value = '';
        document.getElementById('description').value = '';
        document.getElementById('image').value = '';

    };

    reader.readAsDataURL(file);

});

renderProducts();

</script>

</body>
</html>
